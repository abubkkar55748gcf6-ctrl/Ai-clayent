version: '3.8'

services:
  ai-clayent-api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - ai-network

  ai-clayent-worker:
    build: .
    command: python3 main.py
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge
